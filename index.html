<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICON FITNESS GYM</title>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #f5f5f5;
    }

    header {
      background: black;
      padding: 15px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: gold;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #222;
      padding: 10px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
    }

    nav a:hover {
      color: rgb(241, 11, 11);
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
     background: url('001.jpg') no-repeat center/cover;
    }

    .btn {
      padding: 10px 20px;
      background: rgb(238, 255, 4);
      color: black;
      text-decoration: none;
      border-radius: 5px;
    }

    .btn:hover {
      background: rgb(23, 248, 2);
    }

    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
    }

    .video iframe {
      width: 80%;
      height: 400px;
      border-radius: 10px;
    }

    footer {
      background: black;
      padding: 20px;
      text-align: center;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      padding: 15px;
      border-radius: 50%;
      color: white;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>Icon fitness gym</header>

<nav>
  <a href="#home">Home</a>
  <a href="#plans">Plans</a>
  <a href="#gallery">Gallery</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<div class="hero" id="home">
  <h1>Build Your Body 💪</h1>
  <p>Train Hard, Stay Fit</p>
  <a href="#plans" class="btn">Join Now</a>
</div>

<!-- PLANS -->
<div class="section" id="plans">
  <h2>Our Plans</h2>
  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e">
      <h3>Basic</h3>
      <p>₹499</p>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61">
      <h3>Standard</h3>
      <p>₹999</p>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
      <h3>Premium</h3>
      <p>₹1399</p>
    </div>
  </div>
</div>

<!-- GALLERY -->
<div class="section" id="gallery">
  <h2> ICON FITNESS GYM 📸</h2>
  <div class="gallery">
    <img src="567.jpg">
    <img src="123.jpg">
    <img src="wqe.jpg">
  </div>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
  <h2>Contact Us</h2>
  <p>📞 +91 7649030241</p>
  <p>📍 Indore, Madhya Pradesh</p>

  <iframe 
    src="https://www.google.com/maps?q=Bholaram%20Icon%20Fitness%20Gym%20161/3,%20Indra%20Puri%20Colony,%20Indrapuri,%20Indore,%20Madhya%20Pradesh&output=embed"
    width="100%" 
    height="300"
    style="border-radius:10px;">
  </iframe>
</div>

<footer>
  © 2026 ICON FITNESS GYM
</footer>

<a class="whatsapp" href="https://wa.me/917649030241" target="_blank">💬</a>

</body>
</html>
